<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #f7f5f2;          /* Warm minimalist parchment */
      --text-color: #2b2622;        /* Soft charcoal/espresso */
      --border-color: rgba(43, 38, 34, 0.1);
      --primary: #9b7f57;            /* Muted antique gold */
      --font-family: 'Bitcount Prop Single', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: radial-gradient(circle at center, #fbfaf8 30%, #e8decb 100%);
      color: var(--text-color);
      font-family: var(--font-family);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Multi-layered background mandalas of varying sizes */
    .mandala-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      z-index: -1;
      pointer-events: none;
      overflow: hidden;
    }

    .mandala {
      position: absolute;
      background-image: url('1325327.svg');
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
      filter: invert(15%) sepia(95%) saturate(7000%) hue-rotate(350deg) brightness(85%) contrast(110%);
      opacity: 0.05;
    }

    /* Big central one, spinning slowly */
    .mandala-center {
      top: 50%;
      left: 50%;
      width: 125vh;
      height: 125vh;
      margin-top: -62.5vh;
      margin-left: -62.5vh;
      animation: spinClockwise 320s linear infinite;
    }

    /* Top-left corner: almost touches center */
    .mandala-tl {
      top: 0;
      left: 0;
      width: 90vh;
      height: 90vh;
      margin-top: -45vh;
      margin-left: -45vh;
      animation: spinCounter 240s linear infinite;
      opacity: 0.04;
    }

    /* Top-right corner: almost touches center */
    .mandala-tr {
      top: 0;
      right: 0;
      width: 90vh;
      height: 90vh;
      margin-top: -45vh;
      margin-right: -45vh;
      animation: spinClockwise 240s linear infinite;
      opacity: 0.04;
    }

    /* Bottom-left corner: almost touches center */
    .mandala-bl {
      bottom: 0;
      left: 0;
      width: 90vh;
      height: 90vh;
      margin-bottom: -45vh;
      margin-left: -45vh;
      animation: spinClockwise 240s linear infinite;
      opacity: 0.04;
    }

    /* Bottom-right corner: almost touches center */
    .mandala-br {
      bottom: 0;
      right: 0;
      width: 90vh;
      height: 90vh;
      margin-bottom: -45vh;
      margin-right: -45vh;
      animation: spinCounter 240s linear infinite;
      opacity: 0.04;
    }

    @keyframes spinClockwise {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spinCounter {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }

    /* Mockup Navigation Helper */
    .mockup-nav {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 2rem 0;
      border-bottom: 1px solid var(--border-color);
      max-width: 600px;
      margin: 0 auto;
      position: relative;
      z-index: 10;
    }

    .mockup-nav a {
      color: var(--text-color);
      text-decoration: none;
      font-size: 1.15rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      opacity: 0.3;
      transition: opacity 0.3s ease;
    }

    .mockup-nav a:hover, .mockup-nav a.active {
      opacity: 0.8;
    }

    /* Centered Minimal Container */
    .admin-container {
      max-width: 600px;
      margin: 4rem auto 6rem;
      padding: 0 2rem;
      position: relative;
      z-index: 5;
    }

    .admin-title {
      font-size: 2.2rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 2.5rem;
      text-align: center;
      opacity: 0.85;
    }

    /* Elegant physical paper card backing to block background watermarks */
    .glass-card {
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(43, 38, 34, 0.08);
      border-radius: 6px;
      padding: 3rem;
      box-shadow: 0 30px 65px rgba(43, 38, 34, 0.04), 0 5px 15px rgba(43, 38, 34, 0.01);
      backdrop-filter: blur(10px);
    }

    /* Form Layout */
    .upload-form {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .settings-row {
      display: flex;
      gap: 2.5rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 1.5rem;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      opacity: 0.6;
      transition: opacity 0.3s ease;
    }

    .checkbox-group:hover {
      opacity: 0.9;
    }

    .checkbox-group input {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .form-group label {
      font-size: 1.1rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      opacity: 0.45;
    }

    .form-group input[type="text"],
    .form-group input[type="password"],
    .form-group textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid var(--border-color);
      padding: 0.6rem 0;
      color: var(--text-color);
      font-family: var(--font-family);
      font-size: 1.4rem;
      font-weight: 300;
      transition: border-color 0.3s ease;
    }

    .form-group input[type="text"]:focus,
    .form-group input[type="password"]:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: var(--text-color);
    }

    /* Collapsible Compartment */
    .collapsible-section {
      max-height: 500px;
      opacity: 1;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .collapsible-section.collapsed {
      max-height: 0;
      opacity: 0;
      pointer-events: none;
    }

    /* Simple Uploader box */
    .file-input-box {
      border: 1px dashed var(--border-color);
      border-radius: 4px;
      padding: 1.5rem;
      text-align: center;
      cursor: pointer;
      font-size: 1.2rem;
      font-weight: 300;
      color: var(--text-color);
      opacity: 0.5;
      transition: all 0.3s ease;
    }

    .file-input-box:hover {
      opacity: 0.9;
      border-color: var(--text-color);
    }

    /* Action button */
    .btn {
      background: none;
      border: 1px solid var(--text-color);
      color: var(--text-color);
      font-family: var(--font-family);
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: lowercase;
      padding: 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 1rem;
    }

    .btn:hover {
      background: var(--text-color);
      color: var(--bg-color);
    }

    /* Progress and Results */
    .progress-container {
      width: 100%;
      height: 2px;
      background: rgba(43, 38, 34, 0.05);
      display: none;
      margin-top: 1rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: var(--text-color);
      transition: width 0.1s linear;
    }

    .result-box {
      border: 1px dashed var(--border-color);
      padding: 1.5rem;
      border-radius: 4px;
      display: none;
      flex-direction: column;
      gap: 1rem;
      animation: fadeInUp 0.4s ease-out forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .result-box h3 {
      font-size: 1rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .result-box p {
      font-size: 0.85rem;
      font-weight: 300;
      opacity: 0.6;
      line-height: 1.5;
    }

    .link-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .link-input {
      flex: 1;
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      padding: 0.6rem;
      color: var(--text-color);
      font-family: monospace;
      font-size: 0.85rem;
    }

    /* Copy text button */
    .copy-btn {
      background: none;
      border: 1px solid var(--border-color);
      color: var(--text-color);
      padding: 0 1rem;
      border-radius: 4px;
      font-family: var(--font-family);
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: lowercase;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .copy-btn:hover {
      border-color: var(--text-color);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 2rem;
      background: var(--text-color);
      color: var(--bg-color);
      padding: 0.8rem 1.6rem;
      border-radius: 4px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transform: translateY(150%);
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 2000;
    }

    .toast.show {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <!-- Floating multi-size background mandala watermarks -->
  <div class="mandala-bg-container">
    <div class="mandala mandala-center"></div>
    <div class="mandala mandala-tl"></div>
    <div class="mandala mandala-tr"></div>
    <div class="mandala mandala-bl"></div>
    <div class="mandala mandala-br"></div>
  </div>

  <!-- Mockup Navigation Helper -->
  <nav class="mockup-nav">
    <a href="showcase_mockup.html">Showcase</a>
    <a href="visitor_mockup.html">Visitor View</a>
    <a href="admin_mockup.html" class="active">Admin</a>
  </nav>

  <main class="admin-container">
    <h1 class="admin-title">upload room</h1>
    
    <div class="glass-card">
      <div class="upload-form">
        
        <!-- Toggle checkboxes -->
        <div class="settings-row">
          <label class="checkbox-group">
            <input type="checkbox" id="shareableToggle" checked onchange="toggleShareableSection()">
            enable direct link (mode a)
          </label>
          <label class="checkbox-group">
            <input type="checkbox" id="publicToggle" checked>
            publish to showcase
          </label>
        </div>

        <div class="form-group">
          <label for="artTitle">title</label>
          <input type="text" id="artTitle" placeholder="e.g. ambivalence">
        </div>

        <div class="form-group" id="recipientGroup">
          <label for="recipient">recipient (optional)</label>
          <input type="text" id="recipient" placeholder="e.g. sarah">
        </div>

        <div class="form-group">
          <label for="description">description</label>
          <textarea id="description" rows="2" placeholder="artistic context..."></textarea>
        </div>

        <!-- File Upload Area -->
        <div class="form-group">
          <label>preview image (webp/png)</label>
          <div class="file-input-box" id="previewBox" onclick="mockFileUpload('Preview Image')">
            click to select image
          </div>
        </div>

        <div class="form-group">
          <label>drawing timelapse (mp4)</label>
          <div class="file-input-box" id="timelapseBox" onclick="mockFileUpload('Timelapse Video')">
            click to select video
          </div>
        </div>

        <!-- Collapsible asset panel -->
        <div class="collapsible-section" id="shareableSection">
          <div class="section-title">original vector files</div>
          
          <div class="form-group">
            <label>source assets (zip)</label>
            <div class="file-input-box" id="assetsBox" onclick="mockFileUpload('Assets Package')">
              click to select zip package
            </div>
          </div>

          <div class="form-group">
            <label for="downloadPassword">download passcode</label>
            <input type="password" id="downloadPassword" placeholder="leave blank for direct access">
          </div>
        </div>

        <button class="btn" onclick="simulateUpload()">publish design</button>

        <!-- Progress indicator -->
        <div class="progress-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <!-- Link result -->
        <div class="result-box" id="resultBox">
          <h3>upload complete</h3>
          <p id="resultDesc">Ambigram metadata synchronized. Files stored on Drive.</p>
          <div class="form-group" id="resultLinkRow">
            <label>shareable path</label>
            <div class="link-row">
              <input type="text" readonly class="link-input" id="generatedLinkVal" value="http://localhost:3000/ambigram/xT9kR3w2">
              <button class="copy-btn" onclick="copyLink()">copy</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast">
    <span id="toastText">copied</span>
  </div>

  <script>
    const shareableToggle = document.getElementById('shareableToggle');
    const shareableSection = document.getElementById('shareableSection');
    const recipientGroup = document.getElementById('recipientGroup');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const resultBox = document.getElementById('resultBox');
    const resultDesc = document.getElementById('resultDesc');
    const resultLinkRow = document.getElementById('resultLinkRow');
    const generatedLinkVal = document.getElementById('generatedLinkVal');
    const toast = document.getElementById('toast');
    const toastText = document.getElementById('toastText');

    function toggleShareableSection() {
      if (shareableToggle.checked) {
        shareableSection.classList.remove('collapsed');
        recipientGroup.style.opacity = '1';
        recipientGroup.style.pointerEvents = 'auto';
      } else {
        shareableSection.classList.add('collapsed');
        recipientGroup.style.opacity = '0.4';
        recipientGroup.style.pointerEvents = 'none';
      }
    }

    function mockFileUpload(type) {
      showToast(`${type} selected`);
      
      if (type === 'Preview Image') {
        document.getElementById('previewBox').innerText = "✓ images.svg";
      } else if (type === 'Timelapse Video') {
        document.getElementById('timelapseBox').innerText = "✓ timelapse.mp4";
      } else if (type === 'Assets Package') {
        document.getElementById('assetsBox').innerText = "✓ assets_package.zip";
      }
    }

    function simulateUpload() {
      const title = document.getElementById('artTitle').value || 'untitled design';
      resultBox.style.display = 'none';
      progressContainer.style.display = 'block';
      progressBar.style.width = '0%';
      
      let progress = 0;
      const interval = setInterval(() => {
        progress += 10;
        progressBar.style.width = `${progress}%`;
        
        if (progress >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            progressContainer.style.display = 'none';
            showUploadResult(title);
          }, 1500);
        }
      }, 100);
    }

    function showUploadResult(title) {
      resultBox.style.display = 'flex';
      
      if (shareableToggle.checked) {
        const token = Math.random().toString(36).substring(2, 10);
        const generatedLink = window.location.origin + '/ambigram/' + token;
        generatedLinkVal.value = generatedLink;
        resultDesc.innerHTML = `<strong>"${title}"</strong> has been published.`;
        resultLinkRow.style.display = 'flex';
        showToast("link generated");
      } else {
        resultDesc.innerHTML = `<strong>"${title}"</strong> added to showcase.`;
        resultLinkRow.style.display = 'none';
        showToast("added to showcase");
      }
    }

    function copyLink() {
      generatedLinkVal.select();
      generatedLinkVal.setSelectionRange(0, 99999);
      navigator.clipboard.writeText(generatedLinkVal.value).then(() => {
        showToast("link copied to clipboard");
      });
    }

    function showToast(message) {
      toastText.innerText = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
  </script>
</body>
</html>
